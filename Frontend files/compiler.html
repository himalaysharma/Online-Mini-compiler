<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler | CodeCompiler</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Devicon -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <link rel="stylesheet" href="css/compiler.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <nav>

            <div class="left-nav">

                <a href="Homepage.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                    Home
                </a>

                <h1>
                    Code<span>Compiler</span>
                </h1>

            </div>

            <div class="right-nav">

                <div class="language-select">

    <i id="language-icon" class="devicon-cplusplus-plain colored"></i>

    <select id="language-select">

        <option value="c" selected>C</option>

        <option value="cpp">C++</option>

        <option value="java">Java</option>

        <option value="python">Python</option>

    </select>

</div>

                <button class="run-btn">

                    <i class="fa-solid fa-play"></i>

                    Run Code

                </button>

            </div>

        </nav>

    </header>



    <!-- ================= MAIN ================= -->

    <main>

        <!-- ================= EDITOR ================= -->

        <section class="editor">

            <div class="editor-top">

                <div class="file-tab">

                    <i class="fa-regular fa-file-code"></i>

                    <span id="file-name">main.cpp</span>

                </div>

            </div>

           <div class="editor-area">
            <div id ="monaco-editor"></div>
</div>

        </section>



        <!-- ================= TERMINAL ================= -->

        <section class="terminal">

            <div class="terminal-top">

                <h3>Terminal</h3>

                <div class="terminal-actions">

                   <button id="clear-terminal">

    <i class="fa-regular fa-trash-can"></i>

    Clear

</button>

                </div>

            </div>

          <div class="terminal-body">

              <pre id="terminal-output"></pre>
          </div>

        </section>

    </main>



    <!-- ================= STATUS BAR ================= -->

    <footer class="status-bar">

        <div class="status-left">

            <span id = "language-status">C</span>

            <span>|</span>

            <span>Ready</span>

            <span class="green-dot"></span>

        </div>

        <div class="status-right">

            <span id="cursor-position">Ln 1, Col 1</span>

            <span>|</span>

            <span>Spaces: 4</span>

            <span>|</span>

            <span>UTF-8</span>

        </div>

    </footer>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
<script src="js/compiler.js"></script>

</body>
</html>
